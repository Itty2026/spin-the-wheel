<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spin the Wheel</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --card-2: #1f2937;
      --text: #f8fafc;
      --muted: #cbd5e1;
      --accent: #22c55e;
      --accent-2: #3b82f6;
      --danger: #ef4444;
      --border: rgba(255,255,255,0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: var(--text);
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin-top: 0;
      font-size: 2rem;
    }

    p {
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 24px;
      align-items: start;
    }

    .panel {
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    }

    .label {
      display: block;
      font-weight: bold;
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      min-height: 220px;
      resize: vertical;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--card-2);
      color: var(--text);
      padding: 12px;
      font-size: 15px;
      line-height: 1.4;
    }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 14px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-primary {
      background: var(--accent);
      color: #052e16;
    }

    .btn-secondary {
      background: var(--accent-2);
      color: white;
    }

    .btn-light {
      background: #e5e7eb;
      color: #111827;
    }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

     .note {
      font-size: 13px;
      margin-top: 10px;
      color: var(--muted);
    }

    .wheel-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    .pointer {
      width: 0;
      height: 0;
      border-left: 18px solid transparent;
      border-right: 18px solid transparent;
      border-top: 36px solid #facc15;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.35));
      position: relative;
      z-index: 2;
      margin-bottom: -10px;
    }

    canvas {
      width: min(90vw, 520px);
      height: min(90vw, 520px);
      max-width: 520px;
      max-height: 520px;
      background: #ffffff;
      border-radius: 50%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    .winner {
      margin-top: 18px;
      width: 100%;
      text-align: center;
      padding: 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 1.1rem;
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .top-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: 16px 0 0;
      justify-content: center;
    }

    .small {
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
      text-align: center;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Virtual Spin the Wheel</h1>
    <p>Create your wheel, spin it, and share it online with a link.</p>

    <div class="grid">
      <div class="panel">
        <label class="label" for="entries">Wheel Entries (one per line)</label>
        <textarea id="entries">Prize 1
Prize 2
Prize 3
Prize 4
Prize 5
Prize 6</textarea>

        <div class="btn-row">
          <button class="btn-secondary" id="updateBtn">Update Wheel</button>
          <button class="btn-primary" id="spinBtn">Spin</button>
        </div>

        <div class="btn-row">
          <button class="btn-light" id="shareBtn">Copy Share Link</button>
          <button class="btn-danger" id="resetBtn">Reset</button>
        </div>

        <div class="note">
          Tip: after updating the entries, click <strong>Copy Share Link</strong> to send the exact wheel to others.
        </div>
      </div>

      <div class="panel wheel-wrap">
        <div class="pointer"></div>
        <canvas id="wheelCanvas" width="520" height="520"></canvas>

        <div class="top-actions">
          <button class="btn-primary" id="spinBtnBottom">Spin the Wheel</button>
        </div>

        <div class="winner" id="winnerBox">Waiting for a spin...</div>
        <div class="small">Works on desktop and mobile browsers.</div>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("wheelCanvas");
    const ctx = canvas.getContext("2d");
    const entriesInput = document.getElementById("entries");
    const updateBtn = document.getElementById("updateBtn");
    const spinBtn = document.getElementById("spinBtn");
    const spinBtnBottom = document.getElementById("spinBtnBottom");
    const shareBtn = document.getElementById("shareBtn");
    const resetBtn = document.getElementById("resetBtn");
    const winnerBox = document.getElementById("winnerBox");

    let entries = [];
    let rotation = 0;
    let isSpinning = false;

    function sanitizeEntries(raw) {
      return raw
        .split("\n")
        .map(item => item.trim())
        .filter(Boolean)
        .slice(0, 50);
    }

    function getColors(count) {
      const colors = [];
      for (let i = 0; i < count; i++) {
        const hue = Math.round((360 / count) * i);
        colors.push(`hsl(${hue}, 75%, 58%)`);
      }
      return colors;
    }

    function drawWheel() {
      const width = canvas.width;
      const height = canvas.height;
      const centerX = width / 2;
      const centerY = height / 2;
      const radius = 240;

      ctx.clearRect(0, 0, width, height);

      if (entries.length === 0) {
        ctx.fillStyle = "#111827";
        ctx.beginPath();
        ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 24px Arial";
        ctx.textAlign = "center";
        ctx.fillText("No entries", centerX, centerY);
        return;
      }

      const arc = (Math.PI * 2) / entries.length;
      const colors = getColors(entries.length);

      for (let i = 0; i < entries.length; i++) {
        const start = rotation + i * arc - Math.PI / 2;
        const end = start + arc;

        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.arc(centerX, centerY, radius, start, end);
        ctx.closePath();
        ctx.fillStyle = colors[i];
        ctx.fill();
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.rotate(start + arc / 2);
        ctx.textAlign = "right";
        ctx.fillStyle = "#111827";
        ctx.font = "bold 20px Arial";

        let label = entries[i];
        if (label.length > 18) {
           label = label.substring(0, 15) + "...";
        }

        ctx.fillText(label, radius - 18, 8);
        ctx.restore();
      }

      // center circle
      ctx.beginPath();
      ctx.arc(centerX, centerY, 48, 0, Math.PI * 2);
      ctx.fillStyle = "#111827";
      ctx.fill();
      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = 4;
      ctx.stroke();

      ctx.fillStyle = "#ffffff";
      ctx.font = "bold 16px Arial";
      ctx.textAlign = "center";
      ctx.fillText("SPIN", centerX, centerY + 6);
    }

    function updateWheel() {
      entries = sanitizeEntries(entriesInput.value);

      if (entries.length < 2) {
        winnerBox.textContent = "Please enter at least 2 items.";
      } else {
        winnerBox.textContent = "Wheel updated. Ready to spin.";
      }

      drawWheel();
      updateUrlPreview();
    }

    function easeOutCubic(t) {
      return 1 - Math.pow(1 - t, 3);
    }

    function spinWheel() {
      if (isSpinning) return;

      entries = sanitizeEntries(entriesInput.value);
      if (entries.length < 2) {
        winnerBox.textContent = "Please enter at least 2 items before spinning.";
        drawWheel();
        return;
      }

      isSpinning = true;
      spinBtn.disabled = true;
      spinBtnBottom.disabled = true;
      updateBtn.disabled = true;
      winnerBox.textContent = "Spinning...";

      const arc = (Math.PI * 2) / entries.length;
      const selectedIndex = Math.floor(Math.random() * entries.length);

      // Make the selected segment stop under the top pointer
      const fullSpins = 6 + Math.random() * 2;
      const finalRotation =
        (Math.PI * 2 * fullSpins) - ((selectedIndex + 0.5) * arc);

      const startRotation = rotation;
      const duration = 5200;
      const startTime = performance.now();

      function animate(now) {
        const elapsed = now - startTime;
        const t = Math.min(elapsed / duration, 1);
        const eased = easeOutCubic(t);

        rotation = startRotation + (finalRotation - startRotation) * eased;
        drawWheel();

        if (t < 1) {
          requestAnimationFrame(animate);
        } else {
          rotation = finalRotation % (Math.PI * 2);
          drawWheel();
          winnerBox.innerHTML = `Winner: <strong>${entries[selectedIndex]}</strong>`;
          isSpinning = false;
          spinBtn.disabled = false;
          spinBtnBottom.disabled = false;
          updateBtn.disabled = false;
        }
      }

      requestAnimationFrame(animate);
    }

    function updateUrlPreview() {
      const cleanEntries = sanitizeEntries(entriesInput.value);
      const url = new URL(window.location.href);
      url.searchParams.set("items", cleanEntries.join("|"));
      history.replaceState({}, "", url);
    }

    async function copyShareLink() {
      const cleanEntries = sanitizeEntries(entriesInput.value);
      if (cleanEntries.length < 2) {
         winnerBox.textContent = "Please enter at least 2 items before creating a share link.";
        return;
      }

      const url = new URL(window.location.href);
      url.searchParams.set("items", cleanEntries.join("|"));

      try {
        await navigator.clipboard.writeText(url.toString());
        winnerBox.textContent = "Share link copied to clipboard.";
      } catch (error) {
        winnerBox.textContent = "Could not copy automatically. Copy the URL from your browser.";
      }
    }

    function resetWheel() {
      entriesInput.value = `Prize 1
Prize 2
Prize 3
Prize 4
Prize 5
Prize 6`;
      rotation = 0;
      updateWheel();
      winnerBox.textContent = "Wheel reset.";
    }

    function loadFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const items = params.get("items");

      if (items) {
        const parsed = items
          .split("|")
          .map(x => decodeURIComponent(x).trim())
          .filter(Boolean);

        if (parsed.length >= 2) {
          entriesInput.value = parsed.join("\n");
        }
      }
    }

    updateBtn.addEventListener("click", updateWheel);
    spinBtn.addEventListener("click", spinWheel);
    spinBtnBottom.addEventListener("click", spinWheel);
    shareBtn.addEventListener("click", copyShareLink);
    resetBtn.addEventListener("click", resetWheel);

    loadFromUrl();
    updateWheel();
  </script>
</body>
</html>
